<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConexReport - Criar Conta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#1a1f35;--card-border:rgba(6,182,212,0.1);
  --text:#e2e8f0;--text2:#94a3b8;
  --accent:#06b6d4;--accent2:#3b82f6;
  --red:#ef5350;
  --input-bg:#111827;--input-border:#2d3548;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(6,182,212,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.signup-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:36px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:24px}
.logo h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:10px}
.logo p{font-size:12px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.form-group input{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text2);opacity:0.5}
.form-group .hint{font-size:10px;color:var(--text2);margin-top:3px;opacity:0.6}
.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all 0.3s;margin-top:6px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,182,212,0.3)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg-error{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);color:var(--red);display:none}
.links{text-align:center;margin-top:18px;font-size:12px;color:var(--text2)}
.links a{color:var(--accent);text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}
.back-link{display:block;text-align:center;margin-top:12px;font-size:11px}
.back-link a{color:var(--text2);text-decoration:none;opacity:0.6}
.back-link a:hover{opacity:1}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="signup-card">
  <div class="logo">
    <svg width="44" height="44" viewBox="0 0 80 80" fill="none"><rect x="4" y="4" width="72" height="72" rx="16" stroke="url(#sg1)" stroke-width="2"/><path d="M24 52V36M32 52V28M40 52V40M48 52V32M56 52V44" stroke="url(#sg2)" stroke-width="3" stroke-linecap="round"/><defs><linearGradient id="sg1" x1="4" y1="4" x2="76" y2="76" gradientUnits="userSpaceOnUse"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#3b82f6"/></linearGradient><linearGradient id="sg2" x1="24" y1="28" x2="56" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
    <h1>Criar Conta</h1>
    <p>Solicite acesso ao ConexReport</p>
  </div>

  <div id="msg-error" class="msg-error"></div>

  <form id="signup-form">
    <div class="form-group">
      <label for="display_name">Nome Completo</label>
      <input type="text" id="display_name" name="display_name" required placeholder="Seu nome" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email Corporativo</label>
      <input type="email" id="email" name="email" required placeholder="seu.email@brasilseg.com.br" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="new-password">
      <div class="hint">Mínimo 8 caracteres</div>
    </div>
    <div class="form-group">
      <label for="password_confirm">Confirmar Senha</label>
      <input type="password" id="password_confirm" name="password_confirm" required placeholder="Repita a senha" autocomplete="new-password">
    </div>
    <button type="submit" class="btn-submit" id="btn-signup">Criar Conta</button>
  </form>

  <div class="links">
    Já tem conta? <a href="/login">Fazer login</a>
  </div>
  <div class="back-link"><a href="/">&larr; Voltar ao início</a></div>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', function(e){
  e.preventDefault();
  const err = document.getElementById('msg-error');
  err.style.display = 'none';

  const name = document.getElementById('display_name').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password_confirm').value;

  if (pw.length < 8) {
    err.textContent = 'A senha deve ter no mínimo 8 caracteres.';
    err.style.display = 'block';
    return;
  }
  if (pw !== pw2) {
    err.textContent = 'As senhas não coincidem.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.textContent = 'Criando...';

  fetch('/auth/signup', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({display_name: name, email: email, password: pw})
  }).then(r => r.json()).then(data => {
    if (data.ok) {
      window.location.href = '/login?msg=pending';
    } else {
      err.textContent = data.detail || 'Erro ao criar conta.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Criar Conta';
    }
  }).catch(() => {
    err.textContent = 'Erro de conexão. Tente novamente.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Criar Conta';
  });
});
</script>
</body>
</html>
