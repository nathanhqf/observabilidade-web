<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConexReport - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#1a1f35;--card-border:rgba(6,182,212,0.1);
  --text:#e2e8f0;--text2:#94a3b8;
  --accent:#06b6d4;--accent2:#3b82f6;
  --red:#ef5350;--green:#66bb6a;
  --input-bg:#111827;--input-border:#2d3548;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(6,182,212,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:12px}
.logo p{font-size:12px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text2);opacity:0.5}
.btn-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all 0.3s;margin-top:6px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,182,212,0.3)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none}
.msg-error{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);color:var(--red);display:block}
.msg-success{background:rgba(102,187,106,0.1);border:1px solid rgba(102,187,106,0.3);color:var(--green);display:block}
.msg-warning{background:rgba(255,152,0,0.1);border:1px solid rgba(255,152,0,0.3);color:#ff9800;display:block}
.links{text-align:center;margin-top:20px;font-size:12px;color:var(--text2)}
.links a{color:var(--accent);text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}
.back-link{display:block;text-align:center;margin-top:14px;font-size:11px}
.back-link a{color:var(--text2);text-decoration:none;opacity:0.6}
.back-link a:hover{opacity:1}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-card">
  <div class="logo">
    <svg width="48" height="48" viewBox="0 0 80 80" fill="none"><rect x="4" y="4" width="72" height="72" rx="16" stroke="url(#lg1)" stroke-width="2"/><path d="M24 52V36M32 52V28M40 52V40M48 52V32M56 52V44" stroke="url(#lg2)" stroke-width="3" stroke-linecap="round"/><defs><linearGradient id="lg1" x1="4" y1="4" x2="76" y2="76" gradientUnits="userSpaceOnUse"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#3b82f6"/></linearGradient><linearGradient id="lg2" x1="24" y1="28" x2="56" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
    <h1>ConexReport</h1>
    <p>Acesse o painel de observabilidade</p>
  </div>

  <div id="msg" class="msg"></div>

  <form id="login-form" method="POST" action="/auth/login">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="seu.email@brasilseg.com.br" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required placeholder="Digite sua senha" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
  </form>

  <div class="links">
    Novo por aqui? <a href="/signup">Criar conta</a>
  </div>
  <div class="back-link"><a href="/">&larr; Voltar ao início</a></div>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const msgEl = document.getElementById('msg');
  if (params.get('msg') === 'pending') {
    msgEl.className = 'msg msg-warning';
    msgEl.textContent = 'Conta criada com sucesso! Aguarde a aprovação de um administrador para acessar o painel.';
  } else if (params.get('msg') === 'approved') {
    msgEl.className = 'msg msg-success';
    msgEl.textContent = 'Sua conta foi aprovada! Faça login para acessar.';
  } else if (params.get('error') === 'credentials') {
    msgEl.className = 'msg msg-error';
    msgEl.textContent = 'Email ou senha incorretos.';
  } else if (params.get('error') === 'pending') {
    msgEl.className = 'msg msg-warning';
    msgEl.textContent = 'Sua conta ainda está aguardando aprovação de um administrador.';
  } else if (params.get('error') === 'inactive') {
    msgEl.className = 'msg msg-error';
    msgEl.textContent = 'Sua conta foi desativada. Entre em contato com o administrador.';
  } else if (params.get('error') === 'expired') {
    msgEl.className = 'msg msg-warning';
    msgEl.textContent = 'Sessão expirada. Faça login novamente.';
  }

  document.getElementById('login-form').addEventListener('submit', function(){
    document.getElementById('btn-login').disabled = true;
    document.getElementById('btn-login').textContent = 'Entrando...';
  });
})();
</script>
</body>
</html>
